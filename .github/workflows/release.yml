name: Release to PowerShell Gallery

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Install PowerShell 7.6
        shell: bash
        run: dotnet tool install --global PowerShell --version 7.6.2

      - name: Put the .NET tools PowerShell first on PATH
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $HOME '.dotnet/tools')

      - name: Restore VellumPdf assemblies (locked mode)
        shell: bash
        run: pwsh -NoProfile -File ./build.ps1 Restore

      - name: Lint
        shell: bash
        run: pwsh -NoProfile -File ./build.ps1 Lint

      - name: Test
        shell: bash
        run: pwsh -NoProfile -File ./build.ps1 Test

      - name: Stage module layout
        shell: bash
        run: pwsh -NoProfile -File ./build.ps1 Stage

      - name: Verify release tag matches manifest version
        if: github.event_name == 'release'
        shell: pwsh
        run: |
          $manifest = Import-PowerShellDataFile ./out/PSVellumPDF/PSVellumPDF.psd1
          $expected = "v$($manifest.ModuleVersion)"
          $prerelease = $manifest.PrivateData.PSData.Prerelease
          if ($prerelease) { $expected = "$expected-$prerelease" }
          $tag = '${{ github.event.release.tag_name }}'
          if ($tag -ne $expected) {
            throw "Release tag '$tag' does not match manifest version '$expected'. Bump the manifest or fix the tag."
          }
          Write-Host "Tag $tag matches manifest."

      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if (-not $env:PSGALLERY_API_KEY) { throw 'PSGALLERY_API_KEY secret is not available.' }
          Publish-PSResource -Path ./out/PSVellumPDF -Repository PSGallery -ApiKey $env:PSGALLERY_API_KEY
          Write-Host 'Published PSVellumPDF to the PowerShell Gallery.'
